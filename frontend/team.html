<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Profile | findfootball.games</title>
    <link rel="icon" type="image/png" href="/icons8-soccer-ball-96.png">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600;700&family=Geist:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/styles.css?v=1.0.4">
</head>
<body class="theme-flag">
    <div class="glow-bg"></div>

    <header class="app-header">
        <div class="header-container">
            <a href="/" class="logo-area animate-logo">
                <i class="fa-solid fa-trophy trophy-logo"></i>
                <div class="logo-text">
                    <h1>FIND<span>FOOTBALL</span>.GAMES</h1>
                    <p>Watchability Index</p>
                </div>
            </a>
            
            <nav class="header-nav">
                <a href="/" class="nav-link"><i class="fa-solid fa-house"></i> Home</a>
                <a href="/group/A" class="nav-link"><i class="fa-solid fa-table-list"></i> Groups</a>
                <a href="/recommended" class="nav-link"><i class="fa-solid fa-fire"></i> Hot List</a>
                <a href="/bracket" class="nav-link"><i class="fa-solid fa-sitemap"></i> Bracket</a>
                <a href="/calendar" class="nav-link"><i class="fa-regular fa-calendar-days"></i> Calendar</a>
            </nav>
            
            <div class="controls-area">
                <div class="timezone-select-wrapper">
                    <i class="fa-solid fa-globe timezone-icon"></i>
                    <select id="timezone-select" class="timezone-select">
                        <option value="local">Auto-Detect</option>
                        <option value="Europe/Paris">Paris</option>
                        <option value="America/New_York">New York</option>
                        <option value="Asia/Shanghai">Beijing</option>
                    </select>
                </div>
            </div>
        </div>
    </header>

    <main class="app-main">
        <!-- Dynamic Team Hero Banner -->
        <section id="team-hero" class="country-hero-banner">
            <div class="loading-spinner"><i class="fa-solid fa-circle-notch fa-spin"></i> Loading profile...</div>
        </section>

        <!-- Team Summary Info & Players Grid -->
        <section id="team-dashboard" class="country-dashboard-grid" style="display: none;">
            <!-- Form Card -->
            <div class="dashboard-card glass form-card">
                <h3><i class="fa-solid fa-chart-line"></i> Recent Form</h3>
                <p class="desc-text">Last 5 matches:</p>
                <div id="team-form-indicators" class="form-indicators-row">
                    <!-- Dynamic form W-D-L dots -->
                </div>
            </div>

            <!-- Spotlight Players Card -->
            <div class="dashboard-card glass players-card">
                <h3><i class="fa-solid fa-bolt"></i> Spotlight Form Players</h3>
                <div id="spotlight-players-list" class="spotlight-players-container">
                    <!-- Dynamic player form bars -->
                </div>
            </div>
        </section>

        <!-- Future Matches Schedule -->
        <section class="country-schedule-section">
            <h2 class="section-title"><i class="fa-regular fa-calendar-days"></i> Upcoming Matches</h2>
            <div id="team-matches-container" class="recommended-grid">
                <div class="loading-spinner"><i class="fa-solid fa-circle-notch fa-spin"></i> Loading schedule...</div>
            </div>
        </section>
    </main>

    <!-- Match Details Modal -->
    <div id="match-modal" class="modal">
        <div class="modal-content glass">
            <button class="modal-close">&times;</button>
            <div id="modal-details-container">
                <!-- Injected dynamically -->
            </div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast">Weights updated & scores recalculated!</div>

    <footer class="app-footer">
        <p>&copy; 2026 findfootball.games. Reimagining the way we watch football.</p>
    </footer>

    <!-- Custom JS -->
    <script src="/js/navigation.js?v=1.0.4"></script>
    <script src="/js/team.js?v=1.0.3"></script>
</body>
</html>
