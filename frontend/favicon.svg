<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Outer boundary -->
  <circle cx="256" cy="256" r="240" fill="#ffffff" stroke="#1f2937" stroke-width="20"/>
  
  <!-- Central Pentagon (Black) -->
  <polygon points="256,180 328,232 300,318 212,318 184,232" fill="#1f2937" stroke="#1f2937" stroke-width="5"/>
  
  <!-- Top Panel Connection and Hexagons -->
  <line x1="256" y1="180" x2="256" y2="40" stroke="#1f2937" stroke-width="15"/>
  <polygon points="256,40 332,80 328,232 256,180" fill="none" stroke="#1f2937" stroke-width="15"/>
  <polygon points="256,40 180,80 184,232 256,180" fill="none" stroke="#1f2937" stroke-width="15"/>
  
  <!-- Outer pentagon panels (Black) at the top border -->
  <polygon points="256,40 332,80 410,40" fill="#1f2937" stroke="#1f2937" stroke-width="5"/>
  <polygon points="256,40 180,80 102,40" fill="#1f2937" stroke="#1f2937" stroke-width="5"/>
  
  <!-- Side Connections -->
  <line x1="328" y1="232" x2="456" y2="190" stroke="#1f2937" stroke-width="15"/>
  <line x1="300" y1="318" x2="380" y2="430" stroke="#1f2937" stroke-width="15"/>
  <line x1="212" y1="318" x2="132" y2="430" stroke="#1f2937" stroke-width="15"/>
  <line x1="184" y1="232" x2="56" y2="190" stroke="#1f2937" stroke-width="15"/>
  
  <!-- Side Panels (Black) -->
  <polygon points="456,190 472,280 380,330" fill="#1f2937" stroke="#1f2937" stroke-width="5"/>
  <polygon points="456,190 410,40 332,80 328,232" fill="none" stroke="#1f2937" stroke-width="15"/>
  
  <polygon points="56,190 40,280 132,330" fill="#1f2937" stroke="#1f2937" stroke-width="5"/>
  <polygon points="56,190 102,40 180,80 184,232" fill="none" stroke="#1f2937" stroke-width="15"/>
  
  <!-- Bottom Panels (Black) -->
  <polygon points="256,472 290,470 212,318 256,472" fill="#1f2937" stroke="#1f2937" stroke-width="5"/>
  <polygon points="300,318 380,430 290,470" fill="none" stroke="#1f2937" stroke-width="15"/>
</svg>
