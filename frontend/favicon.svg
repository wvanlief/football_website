<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Base circle (White background) -->
  <circle cx="256" cy="256" r="230" fill="#ffffff" stroke="#1f2937" stroke-width="12"/>
  
  <!-- Central Pentagon (Black) -->
  <polygon points="256,170 338,230 307,327 205,327 174,230" fill="#1f2937"/>
  
  <!-- Radiating spokes connecting the center to the outer panels -->
  <line x1="256" y1="170" x2="256" y2="80" stroke="#1f2937" stroke-width="12" stroke-linecap="round"/>
  <line x1="338" y1="230" x2="424" y2="202" stroke="#1f2937" stroke-width="12" stroke-linecap="round"/>
  <line x1="307" y1="327" x2="360" y2="400" stroke="#1f2937" stroke-width="12" stroke-linecap="round"/>
  <line x1="205" y1="327" x2="152" y2="400" stroke="#1f2937" stroke-width="12" stroke-linecap="round"/>
  <line x1="174" y1="230" x2="88" y2="202" stroke="#1f2937" stroke-width="12" stroke-linecap="round"/>
  
  <!-- Outer black panels (which shape the soccer ball hexagons/pentagons at the circle boundaries) -->
  <!-- Top Panel -->
  <polygon points="256,80 200,38 312,38" fill="#1f2937" stroke="#1f2937" stroke-width="12" stroke-linejoin="round"/>
  <!-- Top Right Panel -->
  <polygon points="424,202 470,138 470,266" fill="#1f2937" stroke="#1f2937" stroke-width="12" stroke-linejoin="round"/>
  <!-- Bottom Right Panel -->
  <polygon points="360,400 424,438 310,458" fill="#1f2937" stroke="#1f2937" stroke-width="12" stroke-linejoin="round"/>
  <!-- Bottom Left Panel -->
  <polygon points="152,400 78,438 202,458" fill="#1f2937" stroke="#1f2937" stroke-width="12" stroke-linejoin="round"/>
  <!-- Top Left Panel -->
  <polygon points="88,202 42,138 42,266" fill="#1f2937" stroke="#1f2937" stroke-width="12" stroke-linejoin="round"/>
  
  <!-- Outer connecting lines outlining the white hexagons -->
  <polyline points="256,80 338,107 338,230" fill="none" stroke="#1f2937" stroke-width="12" stroke-linejoin="round"/>
  <polyline points="256,80 174,107 174,230" fill="none" stroke="#1f2937" stroke-width="12" stroke-linejoin="round"/>
  <polyline points="338,230 388,300 360,400" fill="none" stroke="#1f2937" stroke-width="12" stroke-linejoin="round"/>
  <polyline points="174,230 124,300 152,400" fill="none" stroke="#1f2937" stroke-width="12" stroke-linejoin="round"/>
  <polyline points="360,400 256,432 152,400" fill="none" stroke="#1f2937" stroke-width="12" stroke-linejoin="round"/>
</svg>
